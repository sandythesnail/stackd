<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>DEV PREVIEW — Hammy Intro Animation</title>
<style>
  /* ============================================================
     DEV-ONLY PREVIEW — Hammy onboarding intro animation (v2)
     Not linked from the app. Not part of any production flow.
     - Piggy bank: user-supplied SVG artwork (classes renamed pig-* →
       pb-* to avoid colliding with the CSS pig below).
     - Hammy: the site's own CSS pig (.pig-* rules copied from
       styles.css) + the production face-overlay system
       (.hammy-face-overlay from app.css / mobile hammyFaces.ts).
     - Currency: ICON_COIN / ICON_DIAMOND copied verbatim from app.js.
     ============================================================ */
  :root {
    --green: #6B8F65;
    --green-dark: #4A6844;
    --cream: #FAF6ED;
    --pink: #FF96B8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--cream);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .dev-badge {
    position: fixed;
    top: 12px;
    left: 12px;
    background: var(--green-dark);
    color: var(--cream);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border-radius: 6px;
    opacity: 0.75;
    z-index: 50;
  }

  /* ---------- Stage ---------- */
  .stage {
    position: relative;
    width: min(96vw, 560px);
    height: min(84vh, 660px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .stage.exit { opacity: 0; transform: scale(0.92) translateY(-24px); pointer-events: none; }
  .stage.shake { animation: screenShake 0.4s ease-out; }
  @keyframes screenShake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-7px, 4px); }
    40% { transform: translate(7px, -4px); }
    60% { transform: translate(-4px, 3px); }
    80% { transform: translate(3px, -2px); }
  }

  .center-anchor {
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 0;
  }

  /* ---------- Piggy bank (placeholder SVG, classic silhouette) ---------- */
  /* Dramatically larger than v1 — it IS the opening frame's centerpiece. */
  .bank {
    /* The full-screen centerpiece: near-viewport width, capped by height so
       it can't poke off the top of short screens. */
    --bank-w: min(92vw, 84vh, 600px);
    position: absolute;
    left: calc(var(--bank-w) / -2);
    top: calc(var(--bank-w) * 0.80 / -1 + var(--bank-w) * 0.14);
    width: var(--bank-w);
    height: calc(var(--bank-w) * 0.80);
    opacity: 0;
    z-index: 3;
  }
  .bank-half { position: absolute; inset: 0; }
  .bank-half svg { display: block; width: 100%; height: 100%; overflow: visible; }
  /* User-supplied piggy-bank art styles. Classes are pb-* (renamed from the
     source SVG's pig-*) so they can't collide with Hammy's .pig-* CSS pig —
     inline-SVG <style> would otherwise leak into the whole document. */
  .pb-body { fill: #fcd5e3; stroke: #4e353b; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
  .pb-inner { fill: #f99bbd; }
  .pb-outline { stroke: #4e353b; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .pb-dark { fill: #4e353b; }
  .pb-cheek { fill: #f57ba6; opacity: 0.85; }
  /* left/right halves are clipped copies of the same drawing so it can split on the pop */
  .bank-half.left  { clip-path: polygon(0 0, 53% 0, 46% 30%, 55% 55%, 45% 78%, 52% 100%, 0 100%); }
  .bank-half.right { clip-path: polygon(53% 0, 100% 0, 100% 100%, 52% 100%, 45% 78%, 55% 55%, 46% 30%); }

  .crack {
    position: absolute;
    left: 50%;
    top: 29%;
    height: 48%;
    width: 4px;
    transform: translateX(-50%);
    z-index: 4;
    opacity: 0;
    pointer-events: none;
  }
  .crack svg { display: block; width: 34px; height: 100%; margin-left: -15px; overflow: visible; }

  .bank.drop-in { animation: bankDrop 0.65s cubic-bezier(0.22, 1.3, 0.36, 1) forwards; }
  @keyframes bankDrop {
    0%   { opacity: 0; transform: translateY(-140px) scale(0.7); }
    60%  { opacity: 1; transform: translateY(14px) scale(1.04, 0.93); }
    80%  { transform: translateY(-6px) scale(0.98, 1.03); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .bank.wobble { opacity: 1; animation: bankWobble 0.55s ease-in-out; }
  @keyframes bankWobble {
    0%, 100% { transform: rotate(0deg) scale(1); }
    15% { transform: rotate(-4deg) scale(1.02, 0.98); }
    35% { transform: rotate(4deg) scale(0.98, 1.03); }
    55% { transform: rotate(-3.5deg) scale(1.03, 0.97); }
    75% { transform: rotate(3deg) scale(0.99, 1.02); }
  }
  .bank.wobble .crack { animation: crackFlash 0.55s ease-in forwards; }
  @keyframes crackFlash {
    0%, 40% { opacity: 0; }
    55% { opacity: 1; }
    70% { opacity: 0.4; }
    85%, 100% { opacity: 1; }
  }
  .bank.popped { opacity: 1; }
  .bank.popped .crack { opacity: 0; }
  .bank.popped .bank-half.left  { animation: halfLeft 0.6s cubic-bezier(0.3, 0.6, 0.6, 1) forwards; }
  .bank.popped .bank-half.right { animation: halfRight 0.6s cubic-bezier(0.3, 0.6, 0.6, 1) forwards; }
  @keyframes halfLeft {
    0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(-360px, 110px) rotate(-46deg); opacity: 0; }
  }
  @keyframes halfRight {
    0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(360px, 110px) rotate(46deg); opacity: 0; }
  }

  /* ---------- Pop flash ring ---------- */
  .pop-ring {
    position: absolute;
    left: -12px;
    top: -130px; /* centered on the (larger) bank's body */
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 7px solid var(--pink);
    opacity: 0;
    z-index: 2;
    pointer-events: none;
  }
  .pop-ring.go { animation: popRing 0.6s cubic-bezier(0.1, 0.7, 0.3, 1) forwards; }
  @keyframes popRing {
    0%   { opacity: 0.95; transform: scale(0.4); border-width: 14px; }
    100% { opacity: 0; transform: scale(20); border-width: 1px; }
  }
  /* second, gold ring slightly behind the pink one for a layered blast */
  .pop-ring.ring2 { border-color: #FFC400; }
  .pop-ring.ring2.go { animation-duration: 0.75s; animation-delay: 0.06s; }

  /* full-stage flash at the moment of the pop */
  .flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 55%, rgba(255,255,255,0.95), rgba(255,255,255,0) 65%);
    opacity: 0;
    pointer-events: none;
    z-index: 25;
  }
  .flash.go { animation: flashOut 0.45s ease-out forwards; }
  @keyframes flashOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ---------- Currency spill (ICON_COIN / ICON_DIAMOND from app.js) ---------- */
  .particle {
    position: absolute;
    z-index: 6;
    pointer-events: none;
    will-change: transform, opacity;
  }
  .particle svg { display: block; width: 100%; height: 100%; filter: none; }
  /* sparkle glints mixed into the burst: 4-point star shapes */
  .sparkle {
    clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
  }

  /* ---------- Hammy: the site's CSS pig, copied from styles.css ---------- */
  .hammy-wrap {
    position: absolute;
    left: 0;
    bottom: -40px;
    transform: translateX(-50%);
    z-index: 5;
    opacity: 0;
  }
  .hammy-rig { transform-origin: 50% 96%; }
  .hammy-wrap.emerge { opacity: 1; }
  .hammy-wrap.emerge .hammy-rig { animation: hammyEmerge 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes hammyEmerge {
    0%   { opacity: 0; transform: translateY(90px) scale(0.2, 0.1); }
    45%  { opacity: 1; transform: translateY(-22px) scale(0.82, 1.26); }
    65%  { transform: translateY(8px) scale(1.13, 0.87); }
    82%  { transform: translateY(-4px) scale(0.96, 1.05); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .hammy-wrap.wave { opacity: 1; }
  .hammy-wrap.wave .hammy-rig { animation: hammyWave 0.9s ease-in-out forwards; }
  @keyframes hammyWave {
    0%, 100% { transform: rotate(0deg); }
    18% { transform: rotate(-6deg) translateY(-4px); }
    40% { transform: rotate(5deg) translateY(-2px); }
    62% { transform: rotate(-4deg) translateY(-3px); }
    82% { transform: rotate(2.5deg) translateY(0); }
  }
  .hammy-wrap.settled { opacity: 1; }
  /* Exit: two quick bounces (same squash/stretch language as the dialogue
     wiggle), then a big leap off the right edge. */
  .hammy-wrap.hop-off .hammy-rig { animation: hammyHopOff 0.9s cubic-bezier(0.42, 0, 0.58, 1) forwards; }
  @keyframes hammyHopOff {
    0%   { transform: translate(0, 0) scale(1); }
    12%  { transform: translate(0, 10px) scale(1.1, 0.88); }
    30%  { transform: translate(70px, -110px) scale(0.94, 1.1) rotate(8deg); }
    46%  { transform: translate(150px, -10px) scale(1.08, 0.92) rotate(4deg); }
    56%  { transform: translate(150px, 4px) scale(1.12, 0.86) rotate(4deg); }
    72%  { transform: translate(270px, -150px) scale(0.94, 1.08) rotate(12deg); }
    100% { transform: translate(580px, 60px) scale(0.9, 1.05) rotate(18deg); }
  }

  /* ── .pig-* rules copied from styles.css (the production mascot) ── */
  .pig-stage{--pig-scale:1;position:relative;width:calc(440px*var(--pig-scale));height:calc(460px*var(--pig-scale));font-family:system-ui,sans-serif}
  .pig-stage *{box-sizing:border-box}
  .pig-stage .pig-inner{position:absolute;inset:0;transform:scale(var(--pig-scale));transform-origin:top left;width:440px;height:460px}
  .pig-shadow{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:300px;height:46px;background:rgba(214,120,160,.22);border-radius:50%;filter:blur(7px)}
  .pig{position:absolute;bottom:0;left:0;width:440px;height:460px;animation:pigFloat 4.2s ease-in-out infinite}
  .pig div{position:absolute}
  .pig-foot{bottom:34px;width:60px;height:52px;background:#f7a8c4;border-radius:26px 26px 18px 18px;box-shadow:inset 0 -6px 0 rgba(208,99,140,.25)}
  .pig-foot.l{left:120px}.pig-foot.r{right:120px}
  .pig-body{bottom:48px;left:50%;transform:translateX(-50%);width:300px;height:250px;background:linear-gradient(165deg,#ffd4e4,#ffc2d9 60%,#ffb4ce);border-radius:50% 50% 46% 46%;box-shadow:inset -22px -26px 40px rgba(231,131,170,.3),inset 14px 14px 30px rgba(255,255,255,.55)}
  .pig-tummy{bottom:70px;left:50%;transform:translateX(-50%);width:150px;height:120px;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.5),rgba(255,255,255,0) 70%);border-radius:50%}
  .pig-arm{bottom:150px;width:60px;height:48px}
  .pig-arm.l{left:54px;background:linear-gradient(160deg,#ffd0e1,#ffbcd4);border-radius:30px 18px 24px 28px;box-shadow:inset -6px -8px 12px rgba(231,131,170,.25)}
  .pig-arm.r{right:54px;background:linear-gradient(200deg,#ffd0e1,#ffbcd4);border-radius:18px 30px 28px 24px;box-shadow:inset 6px -8px 12px rgba(231,131,170,.25)}
  .pig-ear{top:54px;width:64px;height:74px;border-radius:54% 54% 46% 46%/70% 70% 34% 34%;transform-origin:bottom center}
  .pig-ear.l{left:106px;background:linear-gradient(160deg,#ffc6dc,#ff9fc1);animation:earWiggleL 3.6s ease-in-out infinite;box-shadow:inset -4px -6px 10px rgba(208,99,140,.25)}
  .pig-ear.r{right:106px;background:linear-gradient(200deg,#ffc6dc,#ff9fc1);animation:earWiggleR 3.6s ease-in-out infinite;box-shadow:inset 4px -6px 10px rgba(208,99,140,.25)}
  .pig-ear-inner{top:18px;left:50%;transform:translateX(-50%);width:26px;height:40px;background:#f48bb0;border-radius:54% 54% 46% 46%/64% 64% 36% 36%}
  .pig-head{top:74px;left:50%;transform:translateX(-50%);width:276px;height:248px;background:linear-gradient(160deg,#ffd9e7,#ffc6db 58%,#ffb8d0);border-radius:50% 50% 48% 48%;box-shadow:inset -20px -22px 38px rgba(231,131,170,.28),inset 16px 16px 30px rgba(255,255,255,.6);z-index:2}
  .pig-cheek{top:128px;width:56px;height:40px;background:radial-gradient(circle,#ff9bbe,rgba(255,155,190,0) 70%);border-radius:50%}
  .pig-cheek.l{left:24px}.pig-cheek.r{right:24px}
  .pig-eye{top:100px;width:38px;height:38px;background:#3a2230;border-radius:50%;animation:pigBlink 5s ease-in-out infinite;transform-origin:center}
  .pig-eye.l{left:40px}.pig-eye.r{right:40px}
  .pig-eye .shine1{top:6px;left:6px;width:13px;height:13px;background:#fff;border-radius:50%}
  .pig-eye .shine2{bottom:7px;right:8px;width:7px;height:7px;background:rgba(255,255,255,.7);border-radius:50%}
  .pig-snout{top:96px;left:50%;transform:translateX(-50%);width:118px;height:84px;background:linear-gradient(160deg,#ffb3cd,#ff96b8);border-radius:50%;box-shadow:inset 0 -8px 14px rgba(208,99,140,.3),inset 0 8px 12px rgba(255,255,255,.5),0 4px 8px rgba(208,99,140,.2)}
  .pig-nostril{top:50%;transform:translateY(-50%);width:20px;height:30px;background:#d9608c;border-radius:50%}
  .pig-nostril.l{left:30px}.pig-nostril.r{right:30px}
  @keyframes pigFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-14px) rotate(1deg)}}
  @keyframes pigBlink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
  @keyframes earWiggleL{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(-26deg)}}
  @keyframes earWiggleR{0%,100%{transform:rotate(18deg)}50%{transform:rotate(26deg)}}

  /* ── production face-overlay system (app.css .hammy-face-overlay), no extra
     filters — geometry per face comes from mobile/src/hammyFaces.ts via JS ── */
  .hammy-face-overlay {
    top: 145px; left: 90px; width: 260px; height: 155px;
    background-size: cover; background-position: center; background-repeat: no-repeat;
    z-index: 3; pointer-events: none; opacity: 0; transition: opacity 0.15s ease;
  }
  .has-face-overlay .hammy-face-overlay { opacity: 1; }
  .has-face-overlay .pig-eye, .has-face-overlay .pig-cheek, .has-face-overlay .pig-snout { opacity: 0; }
  .has-face-overlay .pig-head { box-shadow: inset 16px 16px 30px rgba(255,255,255,.35); }
  .has-face-overlay .pig-body { box-shadow: none; }

  /* ---------- Speech bubble ---------- */
  .bubble {
    position: absolute;
    left: 50%;
    bottom: 265px;
    transform: translateX(-50%) scale(0);
    background: #fff;
    color: var(--green-dark);
    font-size: 21px;
    font-weight: 700;
    line-height: 1.3;
    padding: 13px 24px;
    border-radius: 22px;
    border: 3px solid var(--green);
    white-space: normal;
    text-align: center;
    width: max-content;
    max-width: min(80vw, 380px);
    z-index: 7;
    box-shadow: 0 6px 18px rgba(74, 104, 68, 0.18);
    transform-origin: 50% 100%;
  }
  .bubble::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -13px;
    transform: translateX(-50%);
    border: 11px solid transparent;
    border-top-color: var(--green);
    border-bottom: none;
  }
  .bubble.pop-in { animation: bubblePop 0.45s cubic-bezier(0.34, 1.8, 0.64, 1) forwards; }
  @keyframes bubblePop {
    0%   { transform: translateX(-50%) scale(0) rotate(-8deg); }
    70%  { transform: translateX(-50%) scale(1.1) rotate(2deg); }
    100% { transform: translateX(-50%) scale(1) rotate(0deg); }
  }

  /* ---------- Tappable dialogue choice ---------- */
  .choice {
    position: absolute;
    left: 50%;
    bottom: 6px;
    transform: translateX(-50%);
    z-index: 8;
    display: none;
  }
  .choice.show {
    display: block;
    animation: choicePop 0.4s cubic-bezier(0.34, 1.8, 0.64, 1) both,
               choiceNudge 1.6s ease-in-out 0.9s infinite;
  }
  @keyframes choicePop {
    0%   { transform: translateX(-50%) translateY(18px) scale(0.6); opacity: 0; }
    100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
  }
  @keyframes choiceNudge {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-4px); }
  }
  .choice button {
    background: #fff;
    color: var(--green-dark);
    border: 3px solid var(--green);
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    line-height: 1.3;
    padding: 12px 24px;
    border-radius: 999px;
    cursor: pointer;
    max-width: min(84vw, 400px);
    box-shadow: 0 5px 14px rgba(74, 104, 68, 0.18), 0 3px 0 var(--green);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .choice button:hover { transform: translateY(-2px); }
  .choice button:active { transform: translateY(2px); box-shadow: 0 2px 6px rgba(74, 104, 68, 0.18), 0 1px 0 var(--green); }

  /* ---------- Simulated home screen (preview stand-in only) ---------- */
  .home-sim {
    position: fixed;
    inset: 0;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.55s ease;
    z-index: 30;
  }
  .home-sim.show { opacity: 1; pointer-events: auto; }
  .home-sim-card {
    background: #fff;
    border: 3px solid var(--green);
    border-radius: 20px;
    padding: 34px 38px;
    max-width: min(88vw, 440px);
    text-align: center;
    box-shadow: 0 10px 30px rgba(74, 104, 68, 0.15);
    transform: translateY(16px);
    transition: transform 0.55s cubic-bezier(0.22, 1.3, 0.36, 1);
  }
  .home-sim.show .home-sim-card { transform: translateY(0); }
  .home-sim-card h1 { color: var(--green-dark); font-size: 26px; margin-bottom: 10px; }
  .home-sim-card p { color: #6b6b60; font-size: 14.5px; line-height: 1.5; margin-bottom: 20px; }
  .home-sim-card .note { font-size: 12.5px; color: #9a9a8d; margin-bottom: 0; margin-top: 14px; }

  /* ---------- Skip button ---------- */
  .skip {
    position: fixed;
    top: 12px;
    right: 16px;
    z-index: 40;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: var(--green-dark);
    opacity: 0.55;
    cursor: pointer;
    padding: 8px 10px;
    transition: opacity 0.15s ease;
  }
  .skip:hover, .skip:focus-visible { opacity: 1; }
  .skip.hidden { display: none; }

  /* ---------- Review controls ---------- */
  .controls {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 20;
  }
  .controls button, .home-sim-card button {
    background: var(--green);
    color: var(--cream);
    border: none;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    padding: 10px 22px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--green-dark);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .controls button:active, .home-sim-card button:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--green-dark); }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--green-dark);
    cursor: pointer;
    user-select: none;
  }
</style>
</head>
<body>

<div class="dev-badge">DEV PREVIEW · NOT IN APP</div>
<button class="skip" id="skipBtn" type="button">Skip &rarr;</button>

<div class="stage" id="stage">
  <div class="center-anchor" id="anchor">

    <!-- Piggy bank: user-supplied artwork (see BANK_ART in the script below),
         rendered twice and clipped into halves so it can crack apart. -->
    <div class="bank" id="bank">
      <div class="bank-half left"><svg viewBox="0 0 400 320" id="bankSvgL"></svg></div>
      <div class="bank-half right"><svg viewBox="0 0 400 320" id="bankSvgR"></svg></div>
      <div class="crack">
        <svg viewBox="0 0 34 120" preserveAspectRatio="none">
          <path d="M17 0 L10 20 L23 38 L9 60 L21 80 L11 100 L17 120"
                fill="none" stroke="#4e353b" stroke-width="4.5" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <div class="pop-ring" id="popRing"></div>
    <div class="pop-ring ring2" id="popRing2"></div>

    <!-- Hammy: the production CSS pig + face-overlay system (no image halo possible —
         the body is CSS-drawn; faces are the transparent overlay PNGs the app already uses) -->
    <div class="hammy-wrap" id="hammyWrap">
      <div class="hammy-rig">
        <div class="pig-stage has-face-overlay" style="--pig-scale:0.62">
          <div class="pig-inner">
            <div class="pig-shadow"></div>
            <div class="pig">
              <div class="pig-foot l"></div><div class="pig-foot r"></div>
              <div class="pig-body"></div><div class="pig-tummy"></div>
              <div class="pig-arm l"></div><div class="pig-arm r"></div>
              <div class="pig-ear l"><div class="pig-ear-inner"></div></div>
              <div class="pig-ear r"><div class="pig-ear-inner"></div></div>
              <div class="pig-head">
                <div class="pig-cheek l"></div><div class="pig-cheek r"></div>
                <div class="pig-eye l"><div class="shine1"></div><div class="shine2"></div></div>
                <div class="pig-eye r"><div class="shine1"></div><div class="shine2"></div></div>
                <div class="pig-snout"><div class="pig-nostril l"></div><div class="pig-nostril r"></div></div>
              </div>
              <div class="hammy-face-overlay" id="faceOverlay"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bubble" id="bubble"></div>
  </div>

  <div class="choice" id="choice"><button id="choiceBtn" type="button"></button></div>
</div>

<div class="flash" id="flash"></div>

<!-- Stand-in for the home screen. In a real integration this is where the app
     would navigate home; the preview deliberately goes nowhere. -->
<div class="home-sim" id="homeSim">
  <div class="home-sim-card">
    <h1>&#127968; Home screen</h1>
    <p>End of the intro &mdash; at this point the real onboarding flow would
       transition the user to the app&rsquo;s home screen.</p>
    <button id="replayBtn2">&#8635; Replay intro</button>
    <p class="note">Simulated stand-in &mdash; this preview is not wired into the
       real app and does not navigate anywhere.</p>
  </div>
</div>

<div class="controls">
  <button id="replayBtn">&#8635; Replay</button>
  <label><input type="checkbox" id="slowmo"> Slow motion (3&times;)</label>
</div>

<script>
(function () {
  "use strict";

  /* ── Currency icons: copied VERBATIM from app.js (ICON_COIN / ICON_DIAMOND)
     so the spill matches the shop / streak-reward currency art exactly. ── */
  var ICON_COIN = '<svg class="icon-coin" viewBox="0 0 24 24" width="1.15em" height="1.15em" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="#FFC400" stroke="#8A5A00" stroke-width="1.6"/><circle cx="12" cy="12" r="7.3" fill="none" stroke="#8A5A00" stroke-width="1" opacity="0.55"/><text x="12" y="16.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#8A5A00">$</text></svg>';
  var ICON_DIAMOND = '<svg class="icon-diamond" viewBox="0 0 24 24" width="1.15em" height="1.15em" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="8,6 16,6 20,10.5 12,19 4,10.5" fill="#159CDE" stroke="#0A4A6E" stroke-width="1.2" stroke-linejoin="round"/><polygon points="4,10.5 12,19 12,10.5" fill="#0A4A6E" opacity="0.18"/><polygon points="8,6 16,6 20,10.5 4,10.5" fill="#ffffff" opacity="0.3"/><polygon points="9.2,7.4 14.8,7.4 17,10.5 7,10.5" fill="#ffffff" opacity="0.18"/><line x1="4" y1="10.5" x2="20" y2="10.5" stroke="#0A4A6E" stroke-width="0.6" opacity="0.6"/><line x1="12" y1="6" x2="12" y2="19" stroke="#0A4A6E" stroke-width="0.6" opacity="0.55"/><line x1="8" y1="6" x2="9.2" y2="10.5" stroke="#0A4A6E" stroke-width="0.5" opacity="0.4"/><line x1="16" y1="6" x2="14.8" y2="10.5" stroke="#0A4A6E" stroke-width="0.5" opacity="0.4"/><path d="M18.5 4.5l0.6 1.5 1.5 0.6-1.5 0.6-0.6 1.5-0.6-1.5-1.5-0.6 1.5-0.6z" fill="#ffffff" opacity="0.85"/></svg>';

  /* ── Face geometry: ported from mobile/src/hammyFaces.ts (same values as
     app.css .mood-* rules) — top/left/width/height in the pig's 440x460 frame. ── */
  var FACES = {
    streak: { image: "mobile/assets/images/hammy-faces/hammy-happy.png", top: 145, left: 90, width: 260, height: 155 },
    wink:   { image: "mobile/assets/images/hammy-faces/wink-face.png",   top: 143, left: 102, width: 237, height: 160 },
    star:   { image: "mobile/assets/images/hammy-faces/star-face.png",   top: 143, left: 117, width: 206, height: 160 }
  };

  /* ── Dialogue: Hammy line → tappable player reply → next Hammy line.
     `reply` is the choice the user must tap to advance; null = end of script. ── */
  var SCRIPT = [
    { hammy: "Hi, I’m Hammy!", face: "streak", reply: "Hi Hammy! Who are you?" },
    { hammy: "I’ll be guiding you along your journey with financial literacy!", face: "wink", reply: "Sounds good, I’m excited!" },
    { hammy: "Let’s go!", face: "star", reply: null }
  ];

  var stage     = document.getElementById("stage");
  var bank      = document.getElementById("bank");
  var popRing   = document.getElementById("popRing");
  var popRing2  = document.getElementById("popRing2");
  var flash     = document.getElementById("flash");
  var hammyWrap = document.getElementById("hammyWrap");
  var overlay   = document.getElementById("faceOverlay");
  var bubble    = document.getElementById("bubble");
  var choice    = document.getElementById("choice");
  var choiceBtn = document.getElementById("choiceBtn");
  var homeSim   = document.getElementById("homeSim");
  var skipBtn   = document.getElementById("skipBtn");
  var slowmo    = document.getElementById("slowmo");
  var anchor    = document.getElementById("anchor");

  /* ── Piggy-bank artwork supplied by the user (geometry verbatim; classes
     renamed pig-* → pb-*, styles hoisted to the page stylesheet — see CSS).
     Both halves render the same drawing; the .bank-half clip-paths split it. ── */
  var BANK_ART = '' +
    /* Back Ear Outer */
    '<path class="pb-body" d="M 125,113 C 118,67 148,53 162,91 Z" />' +
    /* Back Ear Inner */
    '<path class="pb-inner" d="M 132,107 C 127,77 146,67 155,89 Z" />' +
    '<path class="pb-outline" d="M 132,107 C 127,77 146,67 155,89" />' +
    /* Back Legs */
    '<rect class="pb-body" x="135" y="215" width="32" height="35" rx="12" />' +
    '<rect class="pb-body" x="225" y="215" width="32" height="35" rx="12" />' +
    /* Curly Tail */
    '<path class="pb-outline" d="M 312,165 C 335,165 342,135 322,135 C 305,135 308,158 322,154" />' +
    /* Main Body */
    '<ellipse class="pb-body" cx="210" cy="165" rx="105" ry="78" />' +
    /* Front Legs */
    '<rect class="pb-body" x="155" y="218" width="32" height="35" rx="12" />' +
    '<rect class="pb-body" x="245" y="218" width="32" height="35" rx="12" />' +
    /* Front Ear Outer */
    '<path class="pb-body" d="M 150,118 C 142,70 178,56 192,96 Z" />' +
    /* Front Ear Inner */
    '<path class="pb-inner" d="M 158,112 C 152,78 175,68 184,96 Z" />' +
    '<path class="pb-outline" d="M 158,112 C 152,78 175,68 184,96" />' +
    /* Straight Coin Slot */
    '<rect class="pb-dark" x="192" y="100" width="48" height="8" rx="4" />' +
    /* Snout */
    '<ellipse class="pb-body" cx="102" cy="180" rx="18" ry="24" />' +
    '<ellipse class="pb-inner" cx="102" cy="180" rx="12" ry="17" />' +
    '<ellipse class="pb-dark" cx="97" cy="180" rx="2.5" ry="6" />' +
    '<ellipse class="pb-dark" cx="107" cy="180" rx="2.5" ry="6" />' +
    /* Cheek Blush */
    '<circle class="pb-cheek" cx="150" cy="184" r="14" />' +
    /* Eye + White Glimmer Reflection */
    '<circle class="pb-dark" cx="136" cy="144" r="8.5" />' +
    '<circle fill="#ffffff" cx="133.5" cy="141.5" r="3" />' +
    /* Back Highlight Curve */
    '<path fill="#ffffff" opacity="0.5" d="M 285,130 C 270,110 240,108 220,110 C 245,108 275,117 288,138 Z" />';
  document.getElementById("bankSvgL").innerHTML = BANK_ART;
  document.getElementById("bankSvgR").innerHTML = BANK_ART;

  /* ── Coin jingle: PLACEHOLDER sound, synthesized with WebAudio (the repo has
     no audio assets — swap in a real licensed SFX file later). A pointer-down
     anywhere unlocks the AudioContext per browser autoplay policy; playJingle
     only fires if audio is already permitted, otherwise it skips silently —
     no error, no forced tap-to-enable prompt. ── */
  var audioCtx = null;
  var jingleNodes = [];
  document.addEventListener("pointerdown", function () {
    try {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!audioCtx) audioCtx = new Ctx();
      if (audioCtx.state === "suspended") audioCtx.resume().catch(function () {});
    } catch (e) { /* no audio available — fine */ }
  });

  function playJingle() {
    if (!audioCtx || audioCtx.state !== "running") return; // not permitted yet — skip silently
    try {
      var t0 = audioCtx.currentTime;
      var master = audioCtx.createGain();
      master.gain.value = 0.5;
      master.connect(audioCtx.destination);
      jingleNodes.push(master);
      // staggered high "tings" with fast exponential decay ≈ a handful of coins
      var freqs = [2093, 2637, 3136, 2349, 2794, 3520, 2093];
      for (var i = 0; i < freqs.length; i++) {
        var t = t0 + i * 0.06 + Math.random() * 0.025;
        var osc = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freqs[i] * (0.98 + Math.random() * 0.04);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.22, t + 0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
        osc.connect(g);
        g.connect(master);
        osc.start(t);
        osc.stop(t + 0.35);
        jingleNodes.push(osc);
      }
    } catch (e) { /* never let audio break the animation */ }
  }

  function stopJingle() {
    jingleNodes.forEach(function (n) {
      try { if (n.stop) n.stop(0); n.disconnect(); } catch (e) {}
    });
    jingleNodes = [];
  }

  function setFace(name) {
    var f = FACES[name];
    overlay.style.backgroundImage = 'url("' + f.image + '")';
    overlay.style.top = f.top + "px";
    overlay.style.left = f.left + "px";
    overlay.style.width = f.width + "px";
    overlay.style.height = f.height + "px";
  }

  var timers = [];
  function at(ms, fn) {
    var factor = slowmo.checked ? 3 : 1;
    timers.push(setTimeout(fn, ms * factor));
  }

  function scheduleParticleCleanup(node, durMs) {
    var ms = durMs * (slowmo.checked ? 3 : 1) + 100;
    timers.push(setTimeout(function () { node.remove(); }, ms));
  }

  function spawnCurrency() {
    for (var i = 0; i < 36; i++) {
      var isCoin = i % 5 !== 3; // roughly 4:1 coins to diamonds — coins are the common currency
      var el = document.createElement("div");
      el.className = "particle";
      var size = 34 + Math.random() * 26;
      el.style.width = size + "px";
      el.style.height = size + "px";
      el.style.left = (-size / 2) + "px";
      el.style.top = (-size / 2 - 130) + "px";
      el.innerHTML = (isCoin ? ICON_COIN : ICON_DIAMOND)
        .replace('width="1.15em"', 'width="100%"')
        .replace('height="1.15em"', 'height="100%"');
      anchor.appendChild(el);

      var angle = (-Math.PI / 2) + (Math.random() - 0.5) * 3.0; // near-full upward fan
      var speed = 340 + Math.random() * 440;
      var vx = Math.cos(angle) * speed;
      var vy = Math.sin(angle) * speed;
      var spin = (Math.random() - 0.5) * 1100;
      var dur = 1.0 + Math.random() * 0.5;

      el.animate([
        { transform: "translate(0px, 0px) rotate(0deg) scale(1)", opacity: 1 },
        { transform: "translate(" + vx * 0.5 + "px, " + (vy * 0.5 + 220) + "px) rotate(" + spin + "deg) scale(0.95)",
          opacity: 1, offset: 0.65 },
        { transform: "translate(" + vx * 0.75 + "px, " + (vy * 0.75 + 620) + "px) rotate(" + spin * 1.4 + "deg) scale(0.8)",
          opacity: 0 }
      ], { duration: dur * 1000, easing: "cubic-bezier(0.15, 0.6, 0.5, 1)", fill: "forwards" });

      scheduleParticleCleanup(el, dur * 1000);
    }
  }

  /* Small star glints mixed into the burst — quick, twinkly, gone fast. */
  function spawnSparkles() {
    var colors = ["#FF96B8", "#FFC400", "#FFFFFF", "#FFD9E7"];
    for (var i = 0; i < 26; i++) {
      var el = document.createElement("div");
      el.className = "particle sparkle";
      var size = 10 + Math.random() * 14;
      el.style.width = size + "px";
      el.style.height = size + "px";
      el.style.left = (-size / 2) + "px";
      el.style.top = (-size / 2 - 130) + "px";
      el.style.background = colors[i % colors.length];
      anchor.appendChild(el);

      var angle = Math.random() * Math.PI * 2; // sparkles fly in every direction
      var dist = 90 + Math.random() * 320;
      var dx = Math.cos(angle) * dist;
      var dy = Math.sin(angle) * dist * 0.8 - 60;
      var dur = 0.5 + Math.random() * 0.45;

      el.animate([
        { transform: "translate(0px, 0px) scale(0.2) rotate(0deg)", opacity: 1 },
        { transform: "translate(" + dx * 0.6 + "px, " + dy * 0.6 + "px) scale(1.25) rotate(90deg)", opacity: 1, offset: 0.35 },
        { transform: "translate(" + dx * 0.8 + "px, " + dy * 0.8 + "px) scale(0.7) rotate(140deg)", opacity: 0.9, offset: 0.6 },
        { transform: "translate(" + dx + "px, " + dy + "px) scale(1.1) rotate(180deg)", opacity: 0 }
      ], { duration: dur * 1000, easing: "cubic-bezier(0.2, 0.7, 0.4, 1)", fill: "forwards" });

      scheduleParticleCleanup(el, dur * 1000);
    }
  }

  function showLine(text) {
    bubble.textContent = text;
    bubble.classList.remove("pop-in");
    void bubble.offsetWidth; // restart the pop animation
    bubble.classList.add("pop-in");
  }

  /* Every Hammy line gets the same wave wiggle — remove + reflow + re-add so
     the animation replays even when the class is already present. */
  function replayWave() {
    hammyWrap.classList.remove("wave");
    void hammyWrap.offsetWidth;
    hammyWrap.classList.add("settled", "wave");
  }

  /* Show script line idx: Hammy's face + bubble + wave, then either offer the
     tappable reply (advancing only on tap) or wrap up to the home screen. */
  function hammyLine(idx) {
    var line = SCRIPT[idx];
    setFace(line.face);
    showLine(line.hammy);
    replayWave();

    if (line.reply !== null) {
      // let the user read Hammy's line before the reply chip appears
      at(1300, function () {
        choiceBtn.textContent = line.reply;
        choiceBtn.onclick = function () {
          choice.classList.remove("show");
          choiceBtn.onclick = null;
          at(280, function () { hammyLine(idx + 1); });
        };
        choice.classList.add("show");
      });
    } else {
      // hold "Let's go!" long enough to read, then Hammy hops off-screen
      at(1600, function () {
        bubble.classList.remove("pop-in");
        hammyWrap.classList.remove("wave");
        void hammyWrap.offsetWidth;
        hammyWrap.classList.add("hop-off");
      });
      at(2500, goHome); // fade starts as he clears the edge
    }
  }

  /* Shared ending — used by both the natural finish and the Skip button. */
  function goHome() {
    choice.classList.remove("show");
    skipBtn.classList.add("hidden");
    stage.classList.add("exit");
    at(450, function () { homeSim.classList.add("show"); });
  }

  /* Skip: kill every pending timer, sound, and particle, then jump home —
     nothing may keep running in the background. */
  function skipIntro() {
    timers.forEach(clearTimeout);
    timers = [];
    stopJingle();
    document.querySelectorAll(".particle").forEach(function (p) { p.remove(); });
    bubble.classList.remove("pop-in");
    choiceBtn.onclick = null;
    goHome();
  }

  function reset() {
    timers.forEach(clearTimeout);
    timers = [];
    stopJingle();
    skipBtn.classList.remove("hidden");
    bank.className = "bank";
    popRing.className = "pop-ring";
    popRing2.className = "pop-ring ring2";
    flash.className = "flash";
    hammyWrap.className = "hammy-wrap";
    bubble.className = "bubble";
    bubble.textContent = "";
    choice.classList.remove("show");
    choiceBtn.onclick = null;
    stage.classList.remove("shake", "exit");
    homeSim.classList.remove("show");
    document.querySelectorAll(".particle").forEach(function (p) { p.remove(); });
    void bank.offsetWidth; // reflow so re-added animation classes restart
  }

  function play() {
    reset();
    setFace(SCRIPT[0].face);

    /* Timeline at 1x:
       0.00  giant piggy bank drops in
       0.80  wobble + crack flash
       1.35  POP — flash, double ring, shake, coin/diamond/sparkle burst
       1.45  Hammy springs up (stretch + squash)
       2.30  line 1, then each next line waits for the user's tapped reply */
    bank.classList.add("drop-in");
    at(800, function () {
      bank.classList.remove("drop-in");
      bank.classList.add("wobble");
    });
    at(1350, function () {
      bank.classList.remove("wobble");
      bank.classList.add("popped");
      popRing.classList.add("go");
      popRing2.classList.add("go");
      flash.classList.add("go");
      stage.classList.add("shake");
      playJingle();
      spawnCurrency();
      spawnSparkles();
    });
    at(1450, function () { hammyWrap.classList.add("emerge"); });
    at(2300, function () { hammyLine(0); });
  }

  /* Slow-mo: the JS timeline is scaled in at(); CSS/WAAPI animations started
     while the box is checked get their playbackRate slowed here. */
  var slowLoop = null;
  function applySlowmo() {
    if (slowLoop) { clearInterval(slowLoop); slowLoop = null; }
    if (slowmo.checked) {
      slowLoop = setInterval(function () {
        document.getAnimations().forEach(function (a) {
          if (a.playbackRate !== 1 / 3) a.playbackRate = 1 / 3;
        });
      }, 50);
    } else {
      document.getAnimations().forEach(function (a) { a.playbackRate = 1; });
    }
  }

  function run() {
    play();
    applySlowmo();
  }

  slowmo.addEventListener("change", run);
  document.getElementById("replayBtn").addEventListener("click", run);
  document.getElementById("replayBtn2").addEventListener("click", run);
  skipBtn.addEventListener("click", skipIntro);
  run();
})();
</script>
</body>
</html>
