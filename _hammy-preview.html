<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hammy expression preview (local test only, not part of the app)</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="app.css">
<style>
  body { display: flex; flex-direction: column; align-items: center; gap: 2rem; padding: 3rem 1rem; font-family: system-ui, sans-serif; background: #fdf8f2; }
  h1 { font-size: 1.3rem; color: #4A6844; margin: 0; }
  p { color: #666; max-width: 480px; text-align: center; margin: 0; }
  .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
  .btn-row button {
    font-family: inherit; font-size: 0.95rem; font-weight: 600; padding: 0.6rem 1.2rem;
    border-radius: 10px; border: 1.5px solid #ddd; background: #fff; cursor: pointer;
  }
  .btn-row button:hover { border-color: #4A6844; }
  .stage-wrap { min-height: 320px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
  <h1>Hammy expression preview (option 3: illustrated face, unchanged body)</h1>
  <p>Body/ears/arms are the exact same CSS pig as everywhere else on the site (so outfits still equip normally) — only this quiz-companion instance fades in your artwork over the eyes/snout on a reaction.</p>
  <div class="stage-wrap">
    <div class="hammy-side-avatar" id="preview-avatar">
      <div class="pig-stage" style="--pig-scale:0.8">
        <div class="pig-inner">
          <div class="pig-shadow"></div>
          <div class="pig">
            <div class="pig-foot l"></div><div class="pig-foot r"></div>
            <div class="pig-tail"></div>
            <div class="pig-body"></div><div class="pig-tummy"></div>
            <div class="pig-arm l"></div><div class="pig-arm r"></div>
            <div class="pig-ear l"><div class="pig-ear-inner"></div></div>
            <div class="pig-ear r"><div class="pig-ear-inner"></div></div>
            <div class="pig-head">
              <div class="pig-cheek l"></div><div class="pig-cheek r"></div>
              <div class="pig-eye l"><div class="shine1"></div><div class="shine2"></div></div>
              <div class="pig-eye r"><div class="shine1"></div><div class="shine2"></div></div>
              <div class="pig-snout"><div class="pig-nostril l"></div><div class="pig-nostril r"></div></div>
            </div>
            <div class="hammy-face-overlay"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button onclick="setMood('')">Resting</button>
    <button onclick="setMood('happy')">Correct answer</button>
    <button onclick="setMood('gentle')">Wrong answer</button>
    <button onclick="setMood('happy streak')">3-streak</button>
  </div>
  <script>
    function setMood(cls) {
      const avatar = document.getElementById('preview-avatar');
      avatar.className = 'hammy-side-avatar';
      void avatar.offsetWidth;
      if (cls) avatar.classList.add(...cls.split(' '));
    }
  </script>
</body>
</html>
